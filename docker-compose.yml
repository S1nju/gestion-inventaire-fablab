services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventory-backend
    working_dir: /var/www/html
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - backend_storage:/var/www/html/storage
      - backend_bootstrap_cache:/var/www/html/bootstrap/cache
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://${HOST_IP:-localhost}:8000
      FRONTEND_URL: http://${HOST_IP:-localhost}:3000
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
    command: ["sh", "/usr/local/bin/start-backend.sh"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inventory-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: production
      BACKEND_API_URL: http://backend:8000/api
      NEXT_PUBLIC_BACKEND_API_URL: http://${HOST_IP:-localhost}:8000/api
    # No volumes needed - app is built into the image

volumes:
  backend_vendor:
  backend_storage:
  backend_bootstrap_cache:
